apiVersion: v1
kind: Service
metadata:
  name: story-service
spec:
  selector:
    app: story
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000

---

apiVersion: v1
kind: PersistentVolume
metadata:
  name: host-persistent-volume
spec:
  hostPath:
    path: /data
    type: DirectoryOrCreate
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  storageClassName: standard

---

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: host-persistent-volume-claim
spec:
  volumeName: host-persistent-volume
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: standard

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: story-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
        app: story
  template:
    metadata:
      labels:
        app: story
    spec:
      containers:
        - name: story
          image: avermaas/kub-data-demo:3
          volumeMounts:
            - name: story-volume-3
              mountPath: /app/story
          env:
            - name: STORY_FOLDER
              # value: story
              valueFrom:
                configMapKeyRef:
                  name: data-store-env
                  key: folder
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
            requests:
              memory: 264Mi
              cpu: "0.2"
      volumes:
        - name: story-volume-1 # Lives inside of a Pod
          emptyDir: {}
        - name: story-volume-2 # Lives inside of a Node
          hostPath:
            path: /data # Kinda like a Bind Mount
            type: DirectoryOrCreate
        - name: story-volume-3 # From a volume claim
          persistentVolumeClaim:
            claimName: host-persistent-volume-claim
