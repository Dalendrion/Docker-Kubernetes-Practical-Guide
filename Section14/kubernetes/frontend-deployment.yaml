apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: avermaas/kub-demo-frontend:3
        resources:
          limits:
            memory: 512Mi
            cpu: "1"
          requests:
            memory: 264Mi
            cpu: "0.2"