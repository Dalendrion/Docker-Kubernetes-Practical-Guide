services:
  server:
    # image: nginx:stable-alpine
    build:
      context: .
      dockerfile: dockerfiles/nginx.dockerfile
    ports:
      - 8000:80
    volumes:
      - ./src:/var/www/html # The server will forward PHP files to the PHP interpreter (php service). So it needs access to those files.
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - mysql
    
  php:
    build:
      context: ./dockerfiles
      dockerfile: php.dockerfile
    volumes:
      - ./src:/var/www/html:delegated # :delegated improves performance
    # ports:
      # - 3000:9000
      # php exposes port 9000. My app (see nginx.conf) expects port 3000.
      # But this port isn't needed. We talk directly to containers through the implicit network.
      # Just change fastcgi_pass php:3000; to fastcgi_pass php:3000; and we're done.
  
  mysql:
    image: mysql:5.7
    env_file:
      ./env/mysql.env
    
  composer:
    build:
      context: ./dockerfiles
      dockerfile: compose.dockerfile
    volumes:
      - ./src:/var/www/html

  artisan:
    build:
      context: ./dockerfiles
      dockerfile: php.dockerfile
    volumes:
      - ./src:/var/www/html
  
  npm:
    image: node:14
    working_dir: /var/www/html
    entrypoint: [ "npm" ]
    volumes:
      - ./src:/var/www/html
